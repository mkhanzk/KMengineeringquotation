<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quotation - K.M. Engineering Works</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f8;
}

/* A4 */
@page {
    size: A4;
    margin: 10mm;
}

/* FIXED CONTAINER (no overflow now) */
.container {
    max-width: 190mm;
    margin: auto;
    background: white;
    padding: 10mm;
    box-sizing: border-box;
}

/* Header */
h1 {
    text-align: center;
    color: #2c3e50;
}

h2 {
    text-align: center;
    margin-top: 0;
    color: #34495e;
}

/* Address */
.address {
    text-align: center;
    font-size: 15px;
    font-weight: bold;
}

/* Top row */
.top-row {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

/* Inputs */
input {
    border: none;
    border-bottom: 1px solid #555;
}

.contact {
    border: none;
    font-weight: bold;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    table-layout: fixed;
}

th {
    background: #2c3e50;
    color: white;
    padding: 8px;
    border: 1px solid black;
}

td {
    border: 1px solid black;
    padding: 6px;
    text-align: center;
}

/* Wrap fix */
td, th {
    word-break: break-word;
}

/* Column widths */
th:nth-child(1), td:nth-child(1) { width: 8%; }
th:nth-child(2), td:nth-child(2) { width: 45%; text-align: left; }
th:nth-child(3), td:nth-child(3) { width: 12%; }
th:nth-child(4), td:nth-child(4) { width: 15%; }
th:nth-child(5), td:nth-child(5) { width: 20%; }

/* Inputs */
td input {
    border: none;
    width: 100%;
    background: transparent;
}

/* TEXTAREA */
td textarea {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    overflow: hidden;
    background: transparent;
}

/* Footer */
tfoot td {
    font-weight: bold;
    background: #ecf0f1;
}

.right {
    text-align: right;
}

/* BUTTON FIX */
.no-print {
    margin-top: 10px;
    padding: 10px;
    background: #2c3e50;
    color: white;
    border: none;
    cursor: pointer;
}

/* REMOVE PAGE BREAK ISSUES */
table, tr, td {
    page-break-inside: avoid;
}

/* PRINT FIX */
@media print {
    body { background: white; }
    .no-print { display: none !important; }
}
</style>
</head>

<body>

<div class="container" id="printArea">

<h1>QUOTATION</h1>
<h2>K.M. ENGINEERING WORKS</h2>

<div class="address">
Plot No. 733, Gala No. 3, Ground Floor, Modi Compound, Mazgaon - 400010<br>
K. R. Mhatre Marg, Opp. Reay Road Station<br>
<strong>Contact Number:</strong>
<input class="contact" type="text" value="9819552260 / 8451080507">
</div>

<br>

<div class="top-row">
    <div>
        <strong>Date:</strong> <input type="date">
    </div>
    <div>
        <strong>GST No:</strong> <input type="text" value="27CDNPK4241H1ZF">
    </div>
</div>

<table>
<thead>
<tr>
    <th>Sr No</th>
    <th>Description</th>
    <th>Qty</th>
    <th>Rate</th>
    <th>Amount</th>
</tr>
</thead>

<tbody id="items">
<tr>
    <td>1</td>
    <td><textarea rows="1" oninput="autoResize(this)"></textarea></td>
    <td><input type="number" oninput="calculate()"></td>
    <td><input type="number" oninput="calculate()"></td>
    <td class="amount">0</td>
</tr>
</tbody>

<tfoot>
<tr>
    <td colspan="4" class="right">Subtotal</td>
    <td id="subtotal">0</td>
</tr>

<tr>
    <td colspan="4" class="right">GST (18%)</td>
    <td id="gst">0</td>
</tr>

<tr id="transportRow" style="display:none;">
    <td colspan="4" class="right">Transport</td>
    <td><input type="number" id="transport" oninput="calculate()"></td>
</tr>

<tr>
    <td colspan="4" class="right">Total</td>
    <td id="total">0</td>
</tr>
</tfoot>
</table>

<br><br>

<div style="display: flex; justify-content: flex-end;">
    <div style="width: 250px; text-align: center;">
        <div style="border: 1px solid black; height: 40px;"></div>
        <strong>K.M. ENGINEERING WORKS</strong>
    </div>
</div>

</div>

<!-- BUTTONS -->
<button class="no-print" onclick="addRow()">Add Item / आइटम जोड़ें</button>
<button class="no-print" onclick="toggleTransport()">Add Transport / ट्रांसपोर्ट जोड़ें</button>
<button class="no-print" onclick="downloadPDF()">Download PDF / पीडीएफ डाउनलोड करें</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
function calculate() {
    let rows = document.querySelectorAll("#items tr");
    let subtotal = 0;

    rows.forEach(row => {
        let qty = row.children[2].children[0].value || 0;
        let rate = row.children[3].children[0].value || 0;
        let amount = qty * rate;

        row.querySelector(".amount").innerText = amount;
        subtotal += amount;
    });

    let gst = subtotal * 0.18;
    let transport = document.getElementById("transport")?.value || 0;
    let total = subtotal + gst + Number(transport);

    document.getElementById("subtotal").innerText = subtotal.toFixed(2);
    document.getElementById("gst").innerText = gst.toFixed(2);
    document.getElementById("total").innerText = total.toFixed(2);
}

function addRow() {
    let table = document.getElementById("items");
    let rowCount = table.rows.length + 1;

    let row = table.insertRow();

    row.innerHTML = `
        <td>${rowCount}</td>
        <td><textarea rows="1" oninput="autoResize(this)"></textarea></td>
        <td><input type="number" oninput="calculate()"></td>
        <td><input type="number" oninput="calculate()"></td>
        <td class="amount">0</td>
    `;
}

function toggleTransport() {
    let row = document.getElementById("transportRow");

    if (row.style.display === "none") {
        row.style.display = "table-row";
    } else {
        row.style.display = "none";
        document.getElementById("transport").value = 0;
        calculate();
    }
}

/* Auto resize */
function autoResize(el) {
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
}

/* CLEAN PDF DOWNLOAD */
function downloadPDF() {
    const buttons = document.querySelectorAll('.no-print');
    buttons.forEach(btn => btn.style.display = 'none');

    const element = document.getElementById("printArea");

    html2pdf().set({
        margin: 5,
        filename: 'Quotation.pdf',
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).from(element).save().then(() => {
        buttons.forEach(btn => btn.style.display = 'inline-block');
    });
}
</script>

</body>
</html>
